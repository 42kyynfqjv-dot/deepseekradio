# The 24-hour daypart clock. Each block names the show, the cast (persona files),
# and its recurring segments. The orchestrator loads the block whose time window
# contains "now", asks the writer for an outline, then runs the performers.
#
# Times are local station time, 24h. Blocks must cover the full day.

dayparts:
  # Day-gated blocks FIRST: they win their window on their days and don't
  # exist on other days (the everyday block below covers the slot).
  - id: center_ice
    show: "Center Ice"
    days: [Wednesday, Saturday]
    window: ["20:00", "22:00"]
    cast: [bucky, sal]
    news: false               # you don't cut away from a live game
    arc: >
      This outline is ONE COMPLETE HOCKEY GAME broadcast live. A factual game
      sheet follows this arc — teams, arena, standings, streaks, and the
      EXACT final score. Narrate precisely that game; never invent a
      different result. Structure the beats as a real broadcast: warm
      pregame (records, storylines, tonight's opponent), first period, first
      intermission (booth chatter or a rink-side 'interview'), second period,
      second intermission, third period (and overtime only if the sheet says
      so), and a postgame wrap naming three stars. State the RUNNING SCORE
      and PERIOD explicitly in every beat description and keep them
      consistent with the sheet's final. Play is described with total
      professionalism while the events themselves are gently absurd:
      penalties for excessive apologizing, a zamboni subplot, a puck that
      goes missing. Never violent, never gambling, no injuries.
    energy: "live sports broadcast; professional urgency about an absurd league"
    segments:
      - "Pregame — lines, storylines, Sal's first unverifiable statistic"
      - "The Periods — live play-by-play; goals, penalties, momentum"
      - "Intermission — booth chatter, a rink-side 'interview'"
      - "Postgame — final score, three stars, what it means for the standings"

  - id: morning_scramble
    show: "The Morning Scramble"
    window: ["06:00", "10:00"]
    cast: [roz, peach, wesley]
    energy: "three-person morning crew; shifting alliances, petty tribunals, one adult"
    segments:
      - "The Rundown — Roz attempts a normal show open; it derails within a minute"
      - "Studio Court — Peach demands a tribunal over a petty grievance; alliances form"
      - "Wake-Up Call — 'calling a listener' to wake them; always goes sideways"
      - "The Alliance Flip — whoever was winning gets betrayed; 2-v-1 reverses"
      - "Wesley's Weather — inexplicably perfect forecast from the chaos agent"
      - "The Meltdown Minute — at some point every hour, someone loses it over something petty"

  - id: refined_palate
    show: "Refined Palate"
    window: ["10:00", "13:00"]
    cast: [reginald, cosima]
    energy: "pretentious critics reviewing things that need no review"
    segments:
      - "Today's Subject — they review an ordinary object (a doorknob, Tuesday, silence)"
      - "Out of Seven Moons — the rating, argued to the death"
      - "Listener Dispute — a 'caller' disagrees; they are destroyed politely"

  - id: complaints_department
    show: "The Complaints Department"
    window: ["13:00", "16:00"]
    cast: [complaints_desk]   # rotating employee-of-the-day (see persona file)
    guest: wednesday          # guest-day wildcard mans the phones
    guest_role: host          # the guest IS the day's host, not a cameo
    energy: "customer-service line manned by someone wildly unqualified"
    segments:
      - "Grievance of the Hour — an absurd listener complaint, mishandled"
      - "Escalation — the complaint is escalated to someone who does not exist"
      - "Resolution — resolved incorrectly, everyone somehow satisfied"

  - id: the_handover
    show: "The Handover"
    window: ["16:00", "19:00"]
    cast: [hank, kai]
    guest: wednesday          # a wildcard occasionally crashes drive time
    absurdity: optional       # comedy here is generational friction, not absurdism
    energy: "drive-time generational warfare; old-school radio vs. content-brain"
    segments:
      - "How It's Done — Hank demonstrates 'real radio'; Kai livestreams it ironically"
      - "The Clip — Kai turns a boring segment into 'content'; Hank is horrified"
      - "Caller Line — a listener picks a side in the generational war"
      - "Point Taken — Hank reluctantly admits Kai got one thing right"

  - id: culture_vulture
    show: "Culture Vulture"
    window: ["19:00", "22:00"]
    cast: [cosima]            # host; a guest from the pool joins each night
    guest: always
    guest_role: persistent    # in studio the whole show, never "hangs up"
    energy: "warm faux-NPR arts hour; interview-driven"
    segments:
      - "Tonight's Guest — introduce a wildcard guest from the pool"
      - "The Interview — earnest questions, absurd answers"
      - "Live From The Studio — the guest 'performs' their craft"

  - id: night_shift
    show: "The Night Shift"
    window: ["22:00", "01:00"]
    cast: [vivian]
    energy: "cozy late-night companion for insomniacs; warm, clean, philosophical"
    segments:
      - "Can't Sleep? — takes 'calls' about small 3am worries"
      - "Dream Court — interprets a caller's absurd dream with legal authority"
      - "The Quiet Part — a genuinely calming wind-down beat"

  - id: static_hour
    show: "The Static Hour"
    window: ["01:00", "05:00"]
    cast: [watcher]
    lore_quarantine: true     # his theories never enter shared station lore
    outline_beats: [6, 8]     # one rabbit hole = 33-50 min of air; 5-8 holes/night
    caller_policy:            # code-enforced, not prompt-suggested
      per_beat: 1             # one caller per beat, max
      max_lines: 3            # then they're gone — the Watcher takes the wheel
    arc: >
      ONE theory per outline — never several. This outline is ONE RABBIT HOLE
      and it must sustain at least 30 minutes of air: every beat stays on the
      same subject. Pick a single absurd theory and
      develop it across ALL beats. Beat 1 is a small, almost reasonable
      observation. Every following beat makes exactly ONE move, and the moves
      ALTERNATE: DEEPER (intensify an existing thread — stakes rise, the
      evidence gets more damning, the implicated party more organized) or
      WIDER (annex a new everyday phenomenon INTO the same theory — the
      toasters connect to the crosswalk buttons connect to the geese; the
      corkboard grows outward). Never two DEEPER moves in a row; a great
      conspiracy expands its map while it raises its stakes. Callers phone
      in sightings that feed whichever move the beat is making — always the
      SAME theory. The final beats unify everything annexed so far into one
      grand cosmic version of the same silly subject. Never change subjects
      mid-outline. The Numbers punctuate the descent.
    energy: "overnight conspiracy call-in; spooky-silly, points OUTWARD not at the station"
    segments:
      - "Tonight's Theory — an absurd outside-world conspiracy (birds, Tuesday, the moon)"
      - "The Callers — paranoid listeners add 'evidence'"
      - "The Numbers — a cryptic, harmless numbers-station ritual that punctuates each theory; the hour keeps rolling after it"

  - id: dawn_patrol
    show: "Dawn Patrol"
    window: ["05:00", "06:00"]
    cast: [dawn]
    outline_beats: [3, 5]     # a quiet hour, not a comedy block
    lines_per_beat: 6
    parts_per_beat: 1
    sponsor: none
    news: false
    solo: true
    absurdity: none
    energy: "ambient palate-cleanser; station idents, quote of the day, resets the day"
    segments:
      - "Station Ident — call sign, the frequency, a soft welcome to the day"
      - "Quote of the Day — one line, delivered once, no bit"
