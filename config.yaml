# The Frequency configuration — models, budgets, tuning knobs.
# Prices are current OpenRouter $/M tokens (for the cost estimator only).

models:
  # Head writer: smart, runs rarely (once per show). Writes the bit outlines.
  writer:
    # v4-flash: pro endpoint returned empty completions repeatedly (2026-07-06);
    # outlines don't need pro. Swap back if desired.
    id: deepseek/deepseek-v4-flash
    price_in: 0.09
    price_out: 0.18
    temperature: 0.9
    max_tokens: 2500

  # Performers: cheap, run constantly. Turn beats into in-character dialogue.
  # Qwen3-235B: big enough to keep the Scramble trio's three voices distinct.
  performer:
    id: qwen/qwen3-235b-a22b-2507
    price_in: 0.09
    price_out: 0.10
    temperature: 0.9
    # anti-loop: repetition is a probability attractor; penalize it at the
    # sampler, don't add more prompt rules (instruction saturation is real)
    frequency_penalty: 0.35
    presence_penalty: 0.15
    max_tokens: 2400

  # Script doctor: cheap low-temp mechanical edit pass on every beat (I5).
  polish:
    id: mistralai/mistral-small-24b-instruct-2501
    price_in: 0.05
    price_out: 0.08
    temperature: 0.3
    max_tokens: 1800

  # Cheaper fallbacks:
  # performer.id: mistralai/mistral-small-24b-instruct-2501  (0.05/0.08, ~$3.4/mo)
  # performer.id: inclusionai/ling-2.6-flash                 (0.01/0.03, <$1/mo)

generation:
  # How much dialogue to produce per performer call (minutes of audio).
  segment_minutes: 5
  # Measured average input per performer call (bible+personas+rules+context).
  context_tokens: 3000
  # Words per minute of speech, for pacing + cost estimates.
  words_per_minute: 145
  # Spoken lines per beat (bigger = more audio per LLM call = steadier buffer).
  lines_per_beat: 22
  # Each beat plays out as N chained parts of one continuous scene (~2 min each):
  # callers stay on the line, bits escalate, segments run 5-6+ minutes.
  parts_per_beat: 3
  # Keep the buffer this many minutes ahead of playback.
  buffer_target_minutes: 45

news:
  # Hourly "Frequency News": real headlines pulled from RSS, mangled by the writer
  # into the station's absurd 90-second top-of-the-hour bulletin.
  enabled: true
  feeds:
    - https://feeds.bbci.co.uk/news/world/rss.xml
    - https://hnrss.org/frontpage
  headlines_per_bulletin: 4
  # small writer call each hour: ~1.2k in / 300 out on the writer model

tts:
  engine: kokoro
  sample_rate: 24000
  # voice per character is set in personas/*.md (front-matter `voice:`)
  default_voice: am_adam

stream:
  icecast_host: 127.0.0.1
  icecast_port: 8000
  mount: /live
  bitrate: 96

content:
  # Hard guardrail every persona inherits. See station/bible.md.
  family_friendly: true
